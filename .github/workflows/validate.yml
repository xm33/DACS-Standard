name: Validate documentation and conformance vectors

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate conformance vectors
        run: python3 scripts/validate_conformance_vectors.py

      - name: Validate domain separators
        run: python3 scripts/validate_domain_separators.py

      - name: Validate rule IDs
        run: python3 scripts/validate_rule_ids.py

      - name: Validate selected spec tables
        run: python3 scripts/validate_spec_tables.py

      - name: Validate documentation links
        run: python3 scripts/validate-docs.py

      - name: Run unit tests
        run: python3 -m unittest discover tests -v
